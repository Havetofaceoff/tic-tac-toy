<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="container__modal">
        <h2 class="modal__title">Player X win!</h2>
        <button class="modal__btn">NEW GAME</button>
      </div>
      <div class="container__top">
        <div class="container__card">
          <h2 class="container__name">PLAYER X</h2>
          <p class="container__value x-value">0</p>
        </div>
        <div class="container__card">
          <h2 class="container__name">DRAW</h2>
          <p class="container__value draw-value">0</p>
        </div>
        <div class="container__card">
          <h2 class="container__name">PLAYER O</h2>
          <p class="container__value o-value">0</p>
        </div>
      </div>
      <div class="container__body">
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
        <div class="container__cell"></div>
      </div>
    </div>
  </body>
</html>
